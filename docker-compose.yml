services:
  postgres:
    image: postgres:16-alpine
    container_name: easy-hotel-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-easy_hotel}
      POSTGRES_USER: ${POSTGRES_USER:-easy_hotel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-easy_hotel}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-easy_hotel} -d ${POSTGRES_DB:-easy_hotel}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: easy-hotel-backend
    env_file:
      - ./backend/.env.example
    environment:
      DATABASE_URL: postgresql+psycopg://easy_hotel:easy_hotel@postgres:5432/easy_hotel
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
      python -m app.database.seed &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build:
      context: ./frontend
    container_name: easy-hotel-frontend
    env_file:
      - ./frontend/.env.example
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0

volumes:
  postgres_data:
